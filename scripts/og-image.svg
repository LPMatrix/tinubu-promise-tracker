<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1e1a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8922a"/>
      <stop offset="100%" stop-color="#e8b84b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Gold accent bar left -->
  <rect x="80" y="80" width="5" height="470" fill="url(#accent)" rx="2"/>

  <!-- Eyebrow -->
  <text x="112" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#c8922a" letter-spacing="3" font-weight="400">CIVIC ACCOUNTABILITY · NIGERIA</text>

  <!-- Main headline -->
  <text x="112" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#f5f0e8" letter-spacing="-2">NG</text>
  <text x="112" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#f5f0e8" letter-spacing="-2">Scorecard</text>

  <!-- Divider -->
  <rect x="112" y="358" width="480" height="2" fill="#c8922a" opacity="0.6" rx="1"/>

  <!-- Tagline -->
  <text x="112" y="406" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" fill="#a09080" font-weight="400">Tracking promises, performance &amp; policy</text>
  <text x="112" y="442" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" fill="#a09080" font-weight="400">of the Tinubu administration · 2023–2027</text>

  <!-- Category tags -->
  <!-- Promises -->
  <rect x="112" y="500" width="152" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="188" y="523" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle" letter-spacing="0.5">Promises</text>

  <rect x="276" y="500" width="120" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="336" y="523" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle" letter-spacing="0.5">Fraud</text>

  <rect x="408" y="500" width="152" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="484" y="523" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle" letter-spacing="0.5">Ministers</text>

  <rect x="112" y="548" width="136" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="180" y="571" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle" letter-spacing="0.5">Budget</text>

  <rect x="260" y="548" width="168" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="344" y="571" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle" letter-spacing="0.5">Bills Watch</text>

  <rect x="440" y="548" width="168" height="36" rx="18" fill="#ffffff" fill-opacity="0.06"/>
  <text x="524" y="571" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle" letter-spacing="0.5">Orders &amp; Policy</text>

  <!-- Right side — decorative score rings -->
  <circle cx="980" cy="280" r="160" fill="none" stroke="#c8922a" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="980" cy="280" r="130" fill="none" stroke="#c8922a" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="980" cy="280" r="100" fill="none" stroke="#c8922a" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Full decorative ring -->
  <circle cx="980" cy="280" r="100" fill="none" stroke="#c8922a" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Term label -->
  <text x="980" y="248" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#a09080" text-anchor="middle" letter-spacing="2">PRESIDENTIAL</text>
  <text x="980" y="268" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#a09080" text-anchor="middle" letter-spacing="2">TERM</text>
  <text x="980" y="316" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#f5f0e8" text-anchor="middle">2023</text>
  <line x1="930" y1="328" x2="1030" y2="328" stroke="#c8922a" stroke-opacity="0.5" stroke-width="1"/>
  <text x="980" y="352" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#c8922a" text-anchor="middle">2027</text>

  <!-- Domain watermark -->
  <text x="1160" y="600" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.2" text-anchor="end" letter-spacing="1">ngscorecard.com</text>
</svg>
